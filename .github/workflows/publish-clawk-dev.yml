# Builds and publishes the clawk-dev sandbox image to GHCR.
#
# Triggers: changes to images/clawk-dev/** on the default branch, plus
# manual dispatch for ad-hoc rebuilds (e.g. to pick up a new claude
# release — the npm install isn't pinned, so a rebuild refreshes it).
#
# Platforms: arm64 is what Apple-Silicon clawk VMs boot natively; amd64
# is published alongside for Intel hosts and the future Rosetta path.
#
# Speed: each arch builds on its OWN native runner (amd64 on ubuntu-latest,
# arm64 on ubuntu-24.04-arm) in parallel, with NO QEMU emulation — emulating
# arm64 apt/npm on an amd64 host was the bulk of the old ~5-minute build. The
# two jobs push by digest, then a merge job stitches them into one multi-arch
# tag. Wall-clock is now ~the slower single-arch build plus a few-second merge.
# Note: ubuntu-24.04-arm hosted runners are free for public repos, billed for
# private ones.
#
# Auth is the workflow's own GITHUB_TOKEN (packages: write) — no PAT or
# secret setup needed. The first publish creates the package private;
# flip it to public in the GHCR package settings so sandboxes can pull
# it unauthenticated.
name: publish-clawk-dev

on:
  push:
    branches: [main]
    paths:
      - images/clawk-dev/**
      - .github/workflows/publish-clawk-dev.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/clawk-dev

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels ride the per-arch image config; the merge job attaches the
      # human-facing tags to the assembled manifest list.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: images/clawk-dev
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope so the two matrix jobs don't clobber each
          # other's GHA cache.
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=v0,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
